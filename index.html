<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0b0f17">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Screener Nasdaq 100</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
  :root {
    --bg: #0b0f17; --panel: #131a26; --panel-light: #1a2332;
    --border: #26334a; --text: #e4e9f2; --muted: #8b97ad;
    --green: #22c55e; --green-strong: #16a34a;
    --red: #ef4444; --red-strong: #dc2626;
    --yellow: #eab308; --blue: #3b82f6; --purple: #a855f7;
    --gold: #f59e0b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.5;
    padding-bottom: env(safe-area-inset-bottom);
  }

  header {
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    border-bottom: 1px solid var(--border);
    padding: 14px 18px;
    padding-top: calc(14px + env(safe-area-inset-top));
    position: sticky; top: 0; z-index: 10;
  }
  .header-top { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
  header h1 { font-size: 18px; font-weight: 600; }
  .meta { color: var(--muted); font-size: 12px; margin-top: 4px; }

  /* ONGLETS */
  .tabs {
    display: flex; gap: 6px; margin-top: 12px;
    overflow-x: auto; scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    background: var(--panel); border: 1px solid var(--border); color: var(--text);
    padding: 9px 16px; border-radius: 20px; font-size: 13px; font-weight: 500;
    white-space: nowrap; cursor: pointer; flex-shrink: 0;
  }
  .tab.active { background: var(--blue); border-color: var(--blue); }
  .tab.quality.active { background: var(--gold); border-color: var(--gold); color: #000; }
  .tab.watchlist.active { background: var(--purple); border-color: var(--purple); }

  /* CONTROLES */
  .controls { display: flex; gap: 8px; align-items: center; margin-top: 10px; flex-wrap: wrap; }
  .controls select, .controls input[type="number"] {
    background: var(--panel); border: 1px solid var(--border); color: var(--text);
    padding: 8px 12px; border-radius: 8px; font-size: 13px;
  }
  .controls select { flex: 1; min-width: 120px; }
  .controls input[type="number"] { width: 80px; }
  .controls label.range-label {
    color: var(--muted); font-size: 12px; display: flex; align-items: center; gap: 6px;
  }

  /* SUMMARY */
  .summary {
    display: grid; grid-template-columns: repeat(5, 1fr);
    gap: 8px; padding: 12px 18px;
  }
  .card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 8px; text-align: center; cursor: pointer;
  }
  .card:active { transform: scale(0.96); }
  .card .label { color: var(--muted); font-size: 10px; text-transform: uppercase; }
  .card .value { font-size: 22px; font-weight: 700; margin-top: 2px; }

  /* Couleurs techniques */
  .card.buy-strong { border-top: 3px solid var(--green-strong); }
  .card.buy { border-top: 3px solid var(--green); }
  .card.neutral { border-top: 3px solid var(--muted); }
  .card.sell { border-top: 3px solid var(--red); }
  .card.sell-strong { border-top: 3px solid var(--red-strong); }

  /* Couleurs qualité */
  .card.excellent { border-top: 3px solid var(--gold); }
  .card.good { border-top: 3px solid #eab308; }
  .card.average { border-top: 3px solid var(--muted); }
  .card.weak { border-top: 3px solid #f97316; }
  .card.avoid { border-top: 3px solid var(--red); }

  main { padding: 0 14px 40px; }
  .filters {
    display: flex; gap: 6px; margin-bottom: 10px;
    overflow-x: auto; scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }
  .filters button {
    background: var(--panel); border: 1px solid var(--border); color: var(--text);
    padding: 7px 12px; border-radius: 20px; font-size: 12px; font-weight: 500;
    white-space: nowrap; flex-shrink: 0;
  }
  .filters button.active { background: var(--blue); border-color: var(--blue); }
  .search-input {
    width: 100%; background: var(--panel); border: 1px solid var(--border);
    color: var(--text); padding: 10px 14px; border-radius: 8px;
    font-size: 14px; margin-bottom: 12px;
  }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 900px) {
    .grid { grid-template-columns: 1fr; }
    .summary { padding: 10px 14px; }
    .card .value { font-size: 20px; }
  }

  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .panel-header {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    font-size: 12px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.5px;
  }

  .table-wrap { max-height: calc(100vh - 340px); overflow-y: auto; -webkit-overflow-scrolling: touch; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    text-align: left; padding: 10px 8px;
    background: var(--panel-light); color: var(--muted);
    font-weight: 500; font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.5px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 1;
  }
  tbody tr { border-bottom: 1px solid var(--border); cursor: pointer; }
  tbody tr:active { background: var(--panel-light); }
  tbody tr.selected { background: rgba(59, 130, 246, 0.15); }
  tbody td { padding: 10px 8px; }
  .ticker { font-weight: 700; font-size: 13px; }

  .score {
    display: inline-block; padding: 3px 8px; border-radius: 6px;
    font-weight: 700; font-size: 12px; min-width: 45px; text-align: center;
  }
  .score.pos { background: rgba(34, 197, 94, 0.2); color: var(--green); }
  .score.strong-pos { background: var(--green); color: white; }
  .score.neg { background: rgba(239, 68, 68, 0.2); color: var(--red); }
  .score.strong-neg { background: var(--red); color: white; }
  .score.neutral { background: var(--panel-light); color: var(--muted); }

  .qscore {
    display: inline-block; padding: 3px 8px; border-radius: 6px;
    font-weight: 700; font-size: 12px; min-width: 45px; text-align: center;
  }
  .qscore.excellent { background: var(--gold); color: #000; }
  .qscore.good { background: rgba(245, 158, 11, 0.3); color: var(--gold); }
  .qscore.average { background: var(--panel-light); color: var(--text); }
  .qscore.weak { background: rgba(249, 115, 22, 0.2); color: #f97316; }
  .qscore.avoid { background: rgba(239, 68, 68, 0.2); color: var(--red); }

  .change-pos { color: var(--green); }
  .change-neg { color: var(--red); }

  .mos-pos { color: var(--green); font-weight: 600; }
  .mos-neg { color: var(--red); font-weight: 600; }
  .mos-neutral { color: var(--muted); }

  @media (max-width: 500px) {
    .col-hide-mobile { display: none; }
    thead th, tbody td { padding: 9px 6px; }
  }

  .detail { padding: 16px; }
  .detail-header {
    display: flex; justify-content: space-between;
    align-items: baseline; gap: 8px; flex-wrap: wrap; margin-bottom: 14px;
  }
  .ticker-big { font-size: 22px; font-weight: 700; }
  .sector-tag {
    display: inline-block; background: var(--panel-light);
    padding: 2px 8px; border-radius: 4px; font-size: 11px;
    color: var(--muted); margin-top: 4px;
  }
  .price-big { font-size: 18px; font-weight: 600; }

  .metrics-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
    gap: 8px; margin: 12px 0;
  }
  .metric { background: var(--panel-light); padding: 8px 10px; border-radius: 8px; }
  .metric .k { color: var(--muted); font-size: 10px; text-transform: uppercase; }
  .metric .v { font-size: 14px; font-weight: 600; margin-top: 2px; }
  .metric.bad .v { color: var(--red); }
  .metric.ok .v { color: var(--green); }
  .metric.warn .v { color: var(--yellow); }

  .section-label {
    font-size: 11px; color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.5px; margin-top: 16px; margin-bottom: 6px;
  }

  /* BARRES DE SCORES */
  .score-bar {
    display: flex; align-items: center; gap: 10px;
    margin: 6px 0; font-size: 12px;
  }
  .score-bar .label { min-width: 95px; color: var(--muted); font-size: 11px; }
  .score-bar .bar {
    flex: 1; height: 14px; background: var(--panel-light);
    border-radius: 7px; overflow: hidden; position: relative;
  }
  .score-bar .fill {
    height: 100%; background: linear-gradient(90deg, var(--yellow), var(--green));
    border-radius: 7px;
  }
  .score-bar .fill.low { background: var(--red); }
  .score-bar .fill.mid { background: var(--yellow); }
  .score-bar .fill.high { background: var(--green); }
  .score-bar .val { min-width: 45px; text-align: right; font-weight: 600; }

  /* VALUATION */
  .valuation-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    margin-top: 10px;
  }
  .valuation-box {
    background: var(--panel-light); padding: 10px; border-radius: 8px;
  }
  .valuation-box .k { font-size: 10px; color: var(--muted); text-transform: uppercase; }
  .valuation-box .v { font-size: 16px; font-weight: 700; margin-top: 4px; }
  .valuation-box.highlight { border: 1px solid var(--gold); }

  .verdict-banner {
    padding: 10px 14px; border-radius: 8px; margin-top: 10px;
    text-align: center; font-weight: 600; font-size: 14px;
  }
  .verdict-banner.tres-sous-valorise { background: var(--green); color: white; }
  .verdict-banner.sous-valorise { background: rgba(34, 197, 94, 0.25); color: var(--green); }
  .verdict-banner.juste-prix { background: var(--panel-light); color: var(--text); }
  .verdict-banner.survalorise { background: rgba(239, 68, 68, 0.25); color: var(--red); }
  .verdict-banner.tres-survalorise { background: var(--red); color: white; }

  #chart-container { height: 280px; margin-top: 14px; }
  .placeholder { color: var(--muted); text-align: center; padding: 40px 20px; font-size: 14px; }

  /* Nouveau système de graphiques avancés */
  .chart-stack {
    margin-top: 10px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .chart-block {
    background: var(--panel-light); border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden;
  }
  .chart-block-header {
    padding: 8px 12px; font-size: 11px; font-weight: 600;
    color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px;
    cursor: pointer; user-select: none;
    display: flex; justify-content: space-between; align-items: center;
    background: var(--panel);
  }
  .chart-block-header .arrow { font-size: 10px; transition: transform 0.2s; }
  .chart-block.expanded .chart-block-header .arrow { transform: rotate(90deg); }
  .chart-block-body {
    height: 0; overflow: hidden; transition: height 0.25s;
  }
  .chart-block.expanded .chart-block-body { height: 140px; }
  .chart-block.main .chart-block-body { height: 320px; }
  .chart-block.main .chart-block-header { background: var(--panel-light); cursor: default; }

  /* Signal chips below chart */
  .signal-chip-row {
    display: flex; flex-wrap: wrap; gap: 6px; padding: 10px 0;
  }
  .signal-chip-clickable {
    padding: 6px 12px; border-radius: 16px; font-size: 11px; font-weight: 500;
    cursor: pointer; user-select: none;
    border: 1px solid var(--border); background: var(--panel-light);
    transition: all 0.15s;
  }
  .signal-chip-clickable.bull {
    border-color: var(--green); color: var(--green);
    background: rgba(34, 197, 94, 0.1);
  }
  .signal-chip-clickable.bear {
    border-color: var(--red); color: var(--red);
    background: rgba(239, 68, 68, 0.1);
  }
  .signal-chip-clickable:active { transform: scale(0.96); }
  .signal-chip-clickable.active {
    box-shadow: 0 0 0 2px var(--blue);
  }

  /* Tooltip d'explication signal */
  .signal-explainer {
    background: var(--panel-light); border-left: 3px solid var(--blue);
    padding: 10px 14px; border-radius: 6px; margin-top: 8px;
    font-size: 12px; line-height: 1.55;
  }
  .signal-explainer .title {
    font-weight: 600; color: var(--text); margin-bottom: 4px; font-size: 13px;
  }
  .signal-explainer .desc { color: var(--muted); }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state h2 { font-size: 18px; margin-bottom: 10px; color: var(--text); }
  .empty-state code { background: var(--panel); padding: 2px 8px; border-radius: 4px; color: var(--yellow); }
  .loading { text-align: center; padding: 40px; color: var(--muted); }

  .signals-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .chip {
    padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 500;
    background: var(--panel-light); border: 1px solid var(--border);
  }
  .chip.bull { background: rgba(34, 197, 94, 0.15); border-color: var(--green); color: var(--green); }
  .chip.bear { background: rgba(239, 68, 68, 0.15); border-color: var(--red); color: var(--red); }

  /* INDICATEURS QUALITÉ DÉTAILLÉS */
  .indicator-card {
    background: var(--panel-light);
    border-left: 4px solid var(--muted);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 10px;
    transition: all 0.2s;
  }
  .indicator-card.green { border-left-color: var(--green); }
  .indicator-card.yellow { border-left-color: var(--yellow); }
  .indicator-card.red { border-left-color: var(--red); }
  .indicator-card.gray { border-left-color: var(--muted); opacity: 0.7; }

  .indicator-header {
    display: flex; justify-content: space-between; align-items: center;
    cursor: pointer; user-select: none;
  }
  .indicator-title { font-weight: 600; font-size: 13px; flex: 1; }
  .indicator-value {
    font-weight: 700; font-size: 14px;
    padding: 3px 10px; border-radius: 6px; min-width: 60px; text-align: center;
  }
  .indicator-value.green { background: rgba(34, 197, 94, 0.2); color: var(--green); }
  .indicator-value.yellow { background: rgba(234, 179, 8, 0.2); color: var(--yellow); }
  .indicator-value.red { background: rgba(239, 68, 68, 0.2); color: var(--red); }
  .indicator-value.gray { background: var(--panel); color: var(--muted); }
  .indicator-status {
    width: 10px; height: 10px; border-radius: 50%; margin-right: 8px;
    flex-shrink: 0;
  }
  .indicator-status.green { background: var(--green); }
  .indicator-status.yellow { background: var(--yellow); }
  .indicator-status.red { background: var(--red); }
  .indicator-status.gray { background: var(--muted); }

  .indicator-body {
    margin-top: 10px; padding-top: 10px;
    border-top: 1px solid var(--border);
    font-size: 12px; line-height: 1.5;
    display: none;
  }
  .indicator-card.expanded .indicator-body { display: block; }
  .indicator-body .desc { color: var(--muted); margin-bottom: 8px; }
  .indicator-body .thresholds {
    background: var(--panel); padding: 6px 10px; border-radius: 5px;
    font-family: monospace; font-size: 11px; margin-bottom: 6px;
  }
  .indicator-body .interp {
    color: var(--text); font-style: italic; padding: 6px 0;
  }
  .indicator-arrow {
    margin-left: 8px; color: var(--muted); font-size: 11px;
    transition: transform 0.2s;
  }
  .indicator-card.expanded .indicator-arrow { transform: rotate(90deg); }

  /* SCORE GLOBAL HEADER */
  .quality-summary-strip {
    display: flex; gap: 8px; margin: 10px 0;
    padding: 10px; background: var(--panel-light); border-radius: 8px;
    flex-wrap: wrap; justify-content: space-around;
  }
  .qss-item { text-align: center; min-width: 60px; }
  .qss-item .num { font-size: 20px; font-weight: 700; }
  .qss-item .lab { font-size: 10px; color: var(--muted); text-transform: uppercase; }
  .qss-item.green .num { color: var(--green); }
  .qss-item.yellow .num { color: var(--yellow); }
  .qss-item.red .num { color: var(--red); }

  /* DCF INTERACTIF */
  .dcf-section {
    background: var(--panel-light); padding: 14px;
    border-radius: 10px; margin-top: 10px;
    border: 1px solid var(--gold);
  }
  .dcf-result {
    display: flex; justify-content: space-between;
    align-items: baseline; margin-bottom: 12px;
    flex-wrap: wrap; gap: 8px;
  }
  .dcf-result .ival { font-size: 24px; font-weight: 700; color: var(--gold); }
  .dcf-result .price { font-size: 14px; color: var(--muted); }
  .dcf-mos { font-size: 16px; font-weight: 700; }
  .dcf-mos.pos { color: var(--green); }
  .dcf-mos.neg { color: var(--red); }

  .dcf-control { margin: 10px 0; }
  .dcf-control label {
    display: flex; justify-content: space-between;
    font-size: 12px; color: var(--muted); margin-bottom: 4px;
  }
  .dcf-control label .v { color: var(--text); font-weight: 600; }
  .dcf-control input[type="range"] {
    width: 100%; height: 4px; border-radius: 2px;
    background: var(--border); outline: none; -webkit-appearance: none;
  }
  .dcf-control input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 18px; height: 18px;
    border-radius: 50%; background: var(--gold); cursor: pointer;
  }
  .dcf-control input[type="range"]::-moz-range-thumb {
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--gold); cursor: pointer; border: none;
  }
  .dcf-reset {
    background: var(--panel); border: 1px solid var(--border);
    color: var(--text); padding: 6px 12px; border-radius: 6px;
    font-size: 11px; cursor: pointer; margin-top: 8px;
  }
</style>
</head>
<body>
<header>
  <div class="header-top">
    <div>
      <h1 id="title">📊 Screener Nasdaq 100</h1>
      <div class="meta" id="meta">Chargement…</div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab quality active" data-view="quality">⭐ Qualité</button>
    <button class="tab" data-view="technical">📈 Technique</button>
    <button class="tab watchlist" data-view="watchlist">🎯 Watchlist</button>
  </div>
  <div class="controls" id="controls"></div>
</header>

<div id="app"><div class="loading">Chargement des données…</div></div>

<script>
let DATA_Q = { nasdaq100: null, stoxx600: null };
let DATA_S = { nasdaq100: null, stoxx600: null };
let DATA_P = { nasdaq100: null, stoxx600: null };
let CURRENT_VIEW = "quality";
let CURRENT_UNIVERSE = "nasdaq100";
let CURRENT_HORIZON = "swing";
let CURRENT_FILTER = "all";
let CURRENT_SORT = "default";
let MIN_QUALITY_SCORE = 60;
let SELECTED_TICKER = null;
let chartInstance = null;

const UNIVERSES = {
  nasdaq100: { label: "Nasdaq 100", flag: "🇺🇸" },
  stoxx600:  { label: "STOXX 600", flag: "🇪🇺" },
};

const zoneLabel = {
  ACHAT_FORT: { text: "Achat fort", cls: "strong-pos", emoji: "🟢🟢" },
  ACHAT:      { text: "Achat",      cls: "pos",        emoji: "🟢"   },
  NEUTRE:     { text: "Neutre",     cls: "neutral",    emoji: "⚪"   },
  VENTE:      { text: "Vente",      cls: "neg",        emoji: "🔴"   },
  VENTE_FORT: { text: "Vente fort", cls: "strong-neg", emoji: "🔴🔴" },
};
const tierLabel = {
  EXCELLENTE: { text: "Excellente", cls: "excellent", emoji: "⭐⭐⭐" },
  BONNE:      { text: "Bonne",      cls: "good",      emoji: "⭐⭐"  },
  MOYENNE:    { text: "Moyenne",    cls: "average",   emoji: "⭐"   },
  FAIBLE:     { text: "Faible",     cls: "weak",      emoji: "⚠️"   },
  A_EVITER:   { text: "À éviter",   cls: "avoid",     emoji: "❌"   },
};
const verdictLabel = {
  TRES_SOUS_VALORISE:  { text: "Très sous-valorisé", cls: "tres-sous-valorise" },
  SOUS_VALORISE:       { text: "Sous-valorisé",      cls: "sous-valorise"      },
  JUSTE_PRIX:          { text: "Juste prix",         cls: "juste-prix"         },
  SURVALORISE:         { text: "Survalorisé",        cls: "survalorise"        },
  TRES_SURVALORISE:    { text: "Très survalorisé",   cls: "tres-survalorise"   },
  INCONNU:             { text: "Valorisation inconnue", cls: "juste-prix"      },
};

async function fetchJson(path) {
  try {
    const r = await fetch(`${path}?t=${Date.now()}`);
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

async function loadAll() {
  const tasks = [];
  for (const u of ["nasdaq100", "stoxx600"]) {
    tasks.push(fetchJson(`results_quality_${u}.json`).then(d => DATA_Q[u] = d));
    tasks.push(fetchJson(`results_swing_${u}.json`).then(d => DATA_S[u] = d));
    tasks.push(fetchJson(`results_position_${u}.json`).then(d => DATA_P[u] = d));
  }
  await Promise.all(tasks);

  const hasAny = DATA_Q.nasdaq100 || DATA_Q.stoxx600 || DATA_S.nasdaq100 || DATA_S.stoxx600;
  if (!hasAny) { showEmpty(); return; }

  // Choix initial : le premier univers disponible
  if (!DATA_Q[CURRENT_UNIVERSE] && !DATA_S[CURRENT_UNIVERSE]) {
    CURRENT_UNIVERSE = DATA_Q.nasdaq100 || DATA_S.nasdaq100 ? "nasdaq100" : "stoxx600";
  }
  render();
}

function renderQualityTable() {

  else if (CURRENT_FILTER === "undervalued")
    rows = rows.filter(r => r.verdict === "SOUS_VALORISE" || r.verdict === "TRES_SOUS_VALORISE");
  else if (CURRENT_FILTER !== "all") rows = rows.filter(r => r.tier === CURRENT_FILTER);
  if (search) rows = rows.filter(r => r.ticker.includes(search));

  const sorters = {
    "default": (a, b) => b.total_score - a.total_score,
    "quality": (a, b) => b.quality_score - a.quality_score,
    "mos": (a, b) => (b.valuation.margin_of_safety ?? -99) - (a.valuation.margin_of_safety ?? -99),
    "ticker": (a, b) => a.ticker.localeCompare(b.ticker),
  };
  rows.sort(sorters[CURRENT_SORT] || sorters.default);

  const tbody = document.getElementById("quality-tbody");
  tbody.innerHTML = rows.map(r => {
    const tl = tierLabel[r.tier];
    const mos = r.valuation.margin_of_safety;

    return `
      <tr data-ticker="${r.ticker}" class="${r.ticker === SELECTED_TICKER ? 'selected' : ''}">
        <td class="ticker">${r.flag || ''} ${r.ticker}</td>

function renderWatchlistView() {
  // Combine les données qualité des 2 univers
  const allQ = [];
  for (const u of ["nasdaq100", "stoxx600"]) {
    if (DATA_Q[u]) {
      DATA_Q[u].results.forEach(r => allQ.push({ ...r, _universe: u }));
    }
  }
  if (allQ.length === 0) {
    document.getElementById("app").innerHTML = `<div class="empty-state"><p>Aucune donnée qualité. Lancez d'abord le workflow.</p></div>`;
    return;
  }

  // Récupère les données techniques correspondantes
  const getTech = (ticker, universe) => {
    const techData = CURRENT_HORIZON === "swing" ? DATA_S[universe] : DATA_P[universe];
    return techData ? techData.results.find(t => t.ticker === ticker) : null;
  };

  const qualified = allQ.filter(r => r.total_score >= MIN_QUALITY_SCORE);

  document.getElementById("meta").textContent =
    `🌍 ${qualified.length} actions qualifiées (qualité ≥ ${MIN_QUALITY_SCORE}) · US + EU`;

  // Catégorisation
  const cats = { sweet_spot: 0, accumulate: 0, hold: 0, overbought: 0 };
  qualified.forEach(q => {
    const t = getTech(q.ticker, q._universe);
    if (!t) return;
    const mos = q.valuation.margin_of_safety;
    const ts = t.score;
    if (ts >= 20 && mos !== null && mos >= 0.1) cats.sweet_spot++;
    else if (ts >= 20) cats.accumulate++;
    else if (ts <= -20) cats.overbought++;
    else cats.hold++;
  });

  document.getElementById("app").innerHTML = `
    <section class="summary">
      <div class="card excellent" data-filter="sweet_spot">
        <div class="label">🎯 Sweet spot</div><div class="value">${cats.sweet_spot}</div>
      </div>
      <div class="card buy" data-filter="accumulate">
        <div class="label">🟢 Accumuler</div><div class="value">${cats.accumulate}</div>
      </div>
      <div class="card neutral" data-filter="hold">
        <div class="label">⚪ Garder</div><div class="value">${cats.hold}</div>
      </div>
      <div class="card sell" data-filter="overbought">
        <div class="label">🔴 Alléger</div><div class="value">${cats.overbought}</div>
      </div>
      <div class="card average" data-filter="all">
        <div class="label">🌍 Total</div><div class="value">${qualified.length}</div>
      </div>
    </section>
    <main>
      <div class="filters">
        <button data-f="all" class="active">Tous</button>
        <button data-f="us">🇺🇸 US</button>
        <button data-f="eu">🇪🇺 EU</button>
        <button data-f="sweet_spot">🎯 Sweet spot</button>
        <button data-f="accumulate">🟢 Accumuler</button>
        <button data-f="overbought">🔴 Alléger</button>
      </div>
      <input type="search" id="search" class="search-input" placeholder="🔍 Rechercher...">
      <div class="grid">
        <div class="panel">
          <div class="panel-header">Watchlist globale (US + EU)</div>
          <div class="table-wrap">
            <table>
              <thead><tr>
                <th>Ticker</th><th>Qualité</th><th>Tech</th><th>MoS</th><th>Action</th>
              </tr></thead>
              <tbody id="watch-tbody"></tbody>
            </table>
          </div>
        </div>
        <div class="panel">
          <div class="panel-header">Détail combiné</div>
          <div id="detail" class="detail">
            <div class="placeholder">Touchez une ligne</div>
          </div>
        </div>
      </div>
    </main>`;
  attachCommonListeners();
  renderTable();
}

function getWatchlistCategory(m) {
  if (!m.technical) return "no_tech";
  const mos = m.quality.valuation.margin_of_safety;
  const ts = m.technical.score;
  if (ts >= 20 && mos !== null && mos >= 0.1) return "sweet_spot";
  if (ts >= 20) return "accumulate";
  if (ts <= -20) return "overbought";
  return "hold";
}

function renderWatchlistTable() {
  const search = (document.getElementById("search")?.value || "").toUpperCase();
  const getTech = (ticker, universe) => {
    const techData = CURRENT_HORIZON === "swing" ? DATA_S[universe] : DATA_P[universe];
    return techData ? techData.results.find(t => t.ticker === ticker) : null;
  };

  const allQ = [];
  for (const u of ["nasdaq100", "stoxx600"]) {
    if (DATA_Q[u]) {
      DATA_Q[u].results.forEach(r => allQ.push({ ...r, _universe: u }));
    }
  }

  let merged = allQ
    .filter(r => r.total_score >= MIN_QUALITY_SCORE)
    .map(q => ({
      quality: q,
      technical: getTech(q.ticker, q._universe),
      universe: q._universe,
      category: null,
    }));
  merged.forEach(m => { m.category = getWatchlistCategory(m); });

  // Filtres
  if (CURRENT_FILTER === "us") merged = merged.filter(m => m.universe === "nasdaq100");
  else if (CURRENT_FILTER === "eu") merged = merged.filter(m => m.universe === "stoxx600");
  else if (CURRENT_FILTER !== "all") merged = merged.filter(m => m.category === CURRENT_FILTER);
  if (search) merged = merged.filter(m => m.quality.ticker.includes(search));

  const combined = m => {
    const q = m.quality.total_score;
    const t = m.technical ? m.technical.score : 0;
    return q + t * 0.4;
  };
  const sorters = {
    "default": (a, b) => combined(b) - combined(a),
    "combined": (a, b) => combined(b) - combined(a),
    "quality": (a, b) => b.quality.total_score - a.quality.total_score,
    "technical": (a, b) => (b.technical?.score ?? -99) - (a.technical?.score ?? -99),
    "mos": (a, b) => (b.quality.valuation.margin_of_safety ?? -99) - (a.quality.valuation.margin_of_safety ?? -99),
  };
  merged.sort(sorters[CURRENT_SORT] || sorters.default);

  const catEmoji = { sweet_spot: "🎯", accumulate: "🟢", hold: "⚪", overbought: "🔴", no_tech: "—" };
  const catText  = { sweet_spot: "Sweet spot", accumulate: "Accumuler", hold: "Garder", overbought: "Alléger", no_tech: "—" };

  const tbody = document.getElementById("watch-tbody");
  tbody.innerHTML = merged.map(m => {
    const q = m.quality;
    const t = m.technical;
    const tl = tierLabel[q.tier];
    const mos = q.valuation.margin_of_safety;
    const mosStr = mos === null ? "—" : `${(mos * 100).toFixed(0)}%`;
    const mosCls = mos === null ? "mos-neutral" : mos > 0.1 ? "mos-pos" : mos < -0.1 ? "mos-neg" : "mos-neutral";
    const flag = q.flag || (m.universe === "stoxx600" ? "🇪🇺" : "🇺🇸");
    const techCell = t ? `<span class="score ${t.score>=40?'strong-pos':t.score>=20?'pos':t.score<=-40?'strong-neg':t.score<=-20?'neg':'neutral'}">${t.score>=0?'+':''}${t.score.toFixed(0)}</span>` : '—';
    return `
      <tr data-ticker="${q.ticker}" data-universe="${m.universe}" class="${q.ticker === SELECTED_TICKER ? 'selected' : ''}">
        <td class="ticker">${flag} ${q.ticker}</td>
        <td><span class="qscore ${tl.cls}">${q.total_score.toFixed(0)}</span></td>
        <td>${techCell}</td>
        <td class="${mosCls}">${mosStr}</td>
        <td>${catEmoji[m.category]} ${catText[m.category]}</td>
      </tr>`;
  }).join("");
  attachRowListeners("watchlist");
}

// =========================================================================
// Dispatcher
// =========================================================================
function renderTable() {
  if (CURRENT_VIEW === "quality") renderQualityTable();
  else if (CURRENT_VIEW === "technical") renderTechnicalTable();
  else renderWatchlistTable();
}

function attachCommonListeners() {
  document.querySelectorAll(".card[data-filter]").forEach(c => {
    c.addEventListener("click", () => {
      CURRENT_FILTER = c.dataset.filter;
      document.querySelectorAll(".filters button").forEach(b => b.classList.remove("active"));
      const match = [...document.querySelectorAll(".filters button")].find(b => b.dataset.f === CURRENT_FILTER);
      if (match) match.classList.add("active");
      else document.querySelector('.filters button[data-f="all"]').classList.add("active");
      renderTable();
    });
  });
  document.querySelectorAll(".filters button").forEach(b => {
    b.addEventListener("click", () => {
      document.querySelectorAll(".filters button").forEach(x => x.classList.remove("active"));
      b.classList.add("active");
      CURRENT_FILTER = b.dataset.f;
      renderTable();
    });
  });
  document.getElementById("search")?.addEventListener("input", renderTable);
}

function attachRowListeners(kind) {
  document.querySelectorAll(`#${kind === 'quality' ? 'quality' : kind === 'technical' ? 'tech' : 'watch'}-tbody tr`).forEach(tr => {
    tr.addEventListener("click", () => {
      SELECTED_TICKER = tr.dataset.ticker;
      document.querySelectorAll(`tbody tr`).forEach(x => x.classList.remove("selected"));
      tr.classList.add("selected");
      if (kind === "quality") {
        renderQualityDetail(currentQ().results.find(r => r.ticker === SELECTED_TICKER));
      } else if (kind === "technical") {
        renderTechnicalDetail(currentTech().results.find(r => r.ticker === SELECTED_TICKER));
      } else {
        // watchlist : on a besoin de l'univers du ticker (stocké dans data-universe)
        const universe = tr.dataset.universe;
        const q = DATA_Q[universe]?.results.find(r => r.ticker === SELECTED_TICKER);
        const techData = CURRENT_HORIZON === "swing" ? DATA_S[universe] : DATA_P[universe];
        const t = techData ? techData.results.find(r => r.ticker === SELECTED_TICKER) : null;
        renderCombinedDetail(q, t, universe);
      }
      if (window.innerWidth <= 900) {
        document.getElementById("detail").scrollIntoView({ behavior: "smooth", block: "start" });
      }
    });
  });
}

function formatPct(v, decimals=1) {
  if (v === null || v === undefined || isNaN(v)) return "—";
  return (v * 100).toFixed(decimals) + "%";
}
function formatNum(v, decimals=2) {
  if (v === null || v === undefined || isNaN(v)) return "—";
  return Number(v).toFixed(decimals);
}

// --- DCF interactif ---
function setupDCF(r) {
  const dcfData = r.valuation.dcf_data;
  const cur = r.currency === "EUR" ? "€" : (r.currency === "GBP" ? "£" : "$");
  const initialValues = {
    g5y: dcfData.growth_5y * 100,
    wacc: dcfData.wacc * 100,
    tg: dcfData.terminal_growth * 100,
    fcf: dcfData.fcf_base / 1e9,
  };

  function recompute() {
    const g5y = parseFloat(document.getElementById("dcf-g5y").value) / 100;
    const wacc = parseFloat(document.getElementById("dcf-wacc").value) / 100;
    const tg = parseFloat(document.getElementById("dcf-tg").value) / 100;
    const fcfBase = parseFloat(document.getElementById("dcf-fcf").value) * 1e9;

    document.getElementById("dcf-g5y-val").textContent = (g5y * 100).toFixed(1) + "%";
    document.getElementById("dcf-wacc-val").textContent = (wacc * 100).toFixed(1) + "%";
    document.getElementById("dcf-tg-val").textContent = (tg * 100).toFixed(1) + "%";
    document.getElementById("dcf-fcf-val").textContent = (fcfBase / 1e9).toFixed(2) + " Md" + cur;

    if (wacc <= tg) {
      document.getElementById("dcf-ival").textContent = "—";
      document.getElementById("dcf-mos").textContent = "WACC ≤ croissance terminale";
      return;
    }

    // Projection FCF 5 ans
    const fcfProj = [];
    for (let y = 1; y <= 5; y++) fcfProj.push(fcfBase * Math.pow(1 + g5y, y));
    let pvFcf = 0;
    for (let i = 0; i < 5; i++) pvFcf += fcfProj[i] / Math.pow(1 + wacc, i + 1);

    // Valeur terminale (Gordon)
    const terminalFcf = fcfProj[4] * (1 + tg);
    const terminalValue = terminalFcf / (wacc - tg);
    const pvTerminal = terminalValue / Math.pow(1 + wacc, 5);

    const ev = pvFcf + pvTerminal;
    const equity = ev - dcfData.net_debt;
    const intrinsic = equity / dcfData.shares_outstanding;

    document.getElementById("dcf-ival").textContent = cur + (intrinsic > 0 ? intrinsic.toFixed(2) : "—");

    // Marge de sécurité
    if (r.price && r.price > 0 && intrinsic > 0) {
      const mos = (intrinsic - r.price) / r.price;
      const mosEl = document.getElementById("dcf-mos");
      mosEl.textContent = `MoS ${mos >= 0 ? '+' : ''}${(mos * 100).toFixed(0)}%`;
      mosEl.className = "dcf-mos " + (mos >= 0 ? "pos" : "neg");
    }
  }

  ["dcf-g5y", "dcf-wacc", "dcf-tg", "dcf-fcf"].forEach(id => {
    document.getElementById(id).addEventListener("input", recompute);
  });

  window.resetDCF = function() {
    document.getElementById("dcf-g5y").value = initialValues.g5y;
    document.getElementById("dcf-wacc").value = initialValues.wacc;
    document.getElementById("dcf-tg").value = initialValues.tg;
    document.getElementById("dcf-fcf").value = initialValues.fcf;
    recompute();
  };
}

      height: mainEl.clientHeight || 320,
    });
    window._chart_main = chart;

    // Bougies
    const candleSeries = chart.addCandlestickSeries({
      upColor: '#22c55e', downColor: '#ef4444',
      borderUpColor: '#22c55e', borderDownColor: '#ef4444',
      wickUpColor: '#22c55e', wickDownColor: '#ef4444',
    });
    candleSeries.setData(r.history.map(b => ({
      time: toTime(b.date),
      open: b.open, high: b.high, low: b.low, close: b.close,
    })));

    // EMAs
    if (r.history[0].ema_fast !== null) {
      const emaFast = chart.addLineSeries({ color: '#3b82f6', lineWidth: 2, title: 'EMA rapide' });
      emaFast.setData(r.history.filter(b => b.ema_fast !== null).map(b => ({ time: toTime(b.date), value: b.ema_fast })));
    }
    if (r.history[0].ema_slow !== null) {
      const emaSlow = chart.addLineSeries({ color: '#a855f7', lineWidth: 2, title: 'EMA lente' });
      emaSlow.setData(r.history.filter(b => b.ema_slow !== null).map(b => ({ time: toTime(b.date), value: b.ema_slow })));
    }

    // Bandes de Bollinger
    if (r.history.some(b => b.bb_upper !== null)) {
      const bbUpper = chart.addLineSeries({ color: 'rgba(234,179,8,0.6)', lineWidth: 1, lineStyle: 2, title: 'BB sup' });
      const bbLower = chart.addLineSeries({ color: 'rgba(234,179,8,0.6)', lineWidth: 1, lineStyle: 2, title: 'BB inf' });
      bbUpper.setData(r.history.filter(b => b.bb_upper !== null).map(b => ({ time: toTime(b.date), value: b.bb_upper })));
      bbLower.setData(r.history.filter(b => b.bb_lower !== null).map(b => ({ time: toTime(b.date), value: b.bb_lower })));
    }

    // === ANNOTATIONS DES SIGNAUX ===
    const markers = [];
    const horizontalLines = [];

    (r.signals || []).forEach(signal => {
      const dir = signal.dir;
      const color = dir === "bull" ? "#22c55e" : (dir === "bear" ? "#ef4444" : "#eab308");
      const indices = signal.chart_indices || [];

      // Marker sur chaque bougie impliquée
      indices.forEach((idx, i) => {
        if (idx < 0 || idx >= r.history.length) return;
        const time = toTime(r.history[idx].date);
        const isLast = i === indices.length - 1;
        markers.push({
          time: time,
          position: dir === "bull" ? 'belowBar' : 'aboveBar',
          color: color,
          shape: dir === "bull" ? 'arrowUp' : (dir === "bear" ? 'arrowDown' : 'circle'),
          text: isLast ? signal.name.replaceAll('_', ' ').slice(0, 20) : '',
          size: signal.type === "breakout" ? 2 : 1,
        });
      });

      // Ligne horizontale pour breakout
      if (signal.type === "breakout" && signal.level) {
        horizontalLines.push({
          price: signal.level,
          color: color,
          lineWidth: 2,
          lineStyle: 2,
          axisLabelVisible: true,
          title: signal.level_label || 'Niveau cassé',
        });
      }

      // Trendline pour divergence (entre les 2 bougies clés sur le prix)
      if (signal.type === "divergence" && indices.length === 2 && signal.div_prev_price !== undefined) {
        const trendSeries = chart.addLineSeries({
          color: color, lineWidth: 2, lineStyle: 0, lastValueVisible: false, priceLineVisible: false,
        });
        trendSeries.setData([
          { time: toTime(r.history[indices[0]].date), value: signal.div_prev_price },
          { time: toTime(r.history[indices[1]].date), value: signal.div_last_price },
        ]);
      }
    });

    if (markers.length > 0) {
      // Trier par time car lightweight-charts l'exige
      markers.sort((a, b) => a.time - b.time);
      candleSeries.setMarkers(markers);
    }
    horizontalLines.forEach(line => {
      candleSeries.createPriceLine(line);
    });

    chart.timeScale().fitContent();
  }

  // ==== VOLUME ====
  const volEl = document.getElementById("chart-volume");
  if (volEl) {
    const chart = LightweightCharts.createChart(volEl, {
      ...commonOptions,
      width: volEl.clientWidth,
      height: volEl.clientHeight || 140,
    });
    window._chart_volume = chart;
    const volSeries = chart.addHistogramSeries({ color: '#8b97ad', priceFormat: { type: 'volume' } });
    volSeries.setData(r.history.map(b => {
      const isHigh = b.vol_ma && b.volume > b.vol_ma * 1.5;
      const isUp = b.close >= b.open;
      return {
        time: toTime(b.date),
        value: b.volume,
        color: isHigh ? (isUp ? '#22c55e' : '#ef4444') : 'rgba(139,151,173,0.5)',
      };
    }));

    // Ligne moyenne mobile du volume
    if (r.history[0].vol_ma !== null) {
      const volMa = chart.addLineSeries({ color: '#eab308', lineWidth: 1, lineStyle: 2 });
      volMa.setData(r.history.filter(b => b.vol_ma !== null).map(b => ({ time: toTime(b.date), value: b.vol_ma })));
    }
    chart.timeScale().fitContent();
  }

  // ==== RSI ====
  const rsiEl = document.getElementById("chart-rsi");
  if (rsiEl) {
    const chart = LightweightCharts.createChart(rsiEl, {
      ...commonOptions,
      width: rsiEl.clientWidth,
      height: rsiEl.clientHeight || 140,
    });
    window._chart_rsi = chart;
    const rsiSeries = chart.addLineSeries({ color: '#a855f7', lineWidth: 2 });
    rsiSeries.setData(r.history.filter(b => b.rsi !== null).map(b => ({ time: toTime(b.date), value: b.rsi })));
    // Lignes 30 et 70
    rsiSeries.createPriceLine({ price: 70, color: '#ef4444', lineWidth: 1, lineStyle: 2, axisLabelVisible: true, title: 'Surachat 70' });
    rsiSeries.createPriceLine({ price: 30, color: '#22c55e', lineWidth: 1, lineStyle: 2, axisLabelVisible: true, title: 'Survente 30' });
    rsiSeries.createPriceLine({ price: 50, color: '#8b97ad', lineWidth: 1, lineStyle: 3 });
    chart.timeScale().fitContent();
  }

  // ==== MACD ====
  const macdEl = document.getElementById("chart-macd");
  if (macdEl) {
    const chart = LightweightCharts.createChart(macdEl, {
      ...commonOptions,
      width: macdEl.clientWidth,
      height: macdEl.clientHeight || 140,
    });
    window._chart_macd = chart;

    // Histogramme MACD
    const histSeries = chart.addHistogramSeries({ priceFormat: { type: 'volume', precision: 3 } });
    histSeries.setData(r.history.filter(b => b.macd_hist !== null).map(b => ({
      time: toTime(b.date),
      value: b.macd_hist,
      color: b.macd_hist >= 0 ? 'rgba(34,197,94,0.6)' : 'rgba(239,68,68,0.6)',
    })));

    // MACD line
    const macdSeries = chart.addLineSeries({ color: '#3b82f6', lineWidth: 2 });
    macdSeries.setData(r.history.filter(b => b.macd !== null).map(b => ({ time: toTime(b.date), value: b.macd })));

    // Signal line
    const sigSeries = chart.addLineSeries({ color: '#f97316', lineWidth: 1 });
    sigSeries.setData(r.history.filter(b => b.macd_signal !== null).map(b => ({ time: toTime(b.date), value: b.macd_signal })));

    chart.timeScale().fitContent();
  }

  // Synchroniser les zooms entre charts
  syncCharts();
}

function syncCharts() {
  const charts = ["main", "volume", "rsi", "macd"]
    .map(n => window["_chart_" + n])
    .filter(c => c);

  if (charts.length < 2) return;

  charts.forEach((chart, idx) => {
    chart.timeScale().subscribeVisibleLogicalRangeChange(range => {
      if (!range) return;
      charts.forEach((other, j) => {
        if (j !== idx) other.timeScale().setVisibleLogicalRange(range);
      });
    });
  });
}

function renderChart(r) {
  // Conservée pour compat avec watchlist - utilise renderAdvancedChart si possible
  renderAdvancedChart(r);
}

// =========================================================================
// DETAIL COMBINÉ (Watchlist)
// =========================================================================
function renderCombinedDetail(q, t, universe) {
  if (!q) return;
  const tl = tierLabel[q.tier];
  const vl = verdictLabel[q.verdict];
  const v = q.valuation;
  const flag = q.flag || (universe === "stoxx600" ? "🇪🇺" : "🇺🇸");

  let recommendation = "";
  if (t) {
    const mos = v.margin_of_safety;
    if (t.score >= 20 && mos !== null && mos >= 0.1) {
      recommendation = `<div class="verdict-banner tres-sous-valorise">🎯 Sweet spot : qualité solide, sous-valorisée, et timing technique favorable</div>`;
    } else if (t.score >= 20) {
      recommendation = `<div class="verdict-banner sous-valorise">🟢 Bon timing technique sur une action de qualité — mais surveillez la valorisation</div>`;
    } else if (t.score <= -20) {
      recommendation = `<div class="verdict-banner survalorise">🔴 Signaux techniques baissiers — attendre un meilleur point d'entrée</div>`;
    } else {
      recommendation = `<div class="verdict-banner juste-prix">⚪ Qualité OK mais signaux techniques neutres — patience</div>`;
    }
  } else {
    recommendation = `<div class="verdict-banner juste-prix">Pas de données techniques disponibles</div>`;
  }

  document.getElementById("detail").innerHTML = `
    <div class="detail-header">
      <div>
        <div class="ticker-big">${flag} ${q.ticker}</div>
        <div class="sector-tag">${q.sector || ""}</div>
        <div style="margin-top:6px">
          ${tl.emoji} <span class="qscore ${tl.cls}">${q.total_score.toFixed(0)}</span>
          ${t ? `· Tech <span class="score ${t.score>=40?'strong-pos':t.score>=20?'pos':t.score<=-40?'strong-neg':t.score<=-20?'neg':'neutral'}">${t.score>=0?'+':''}${t.score.toFixed(0)}</span>` : ''}
        </div>
      </div>
      <div>
        <div class="price-big">$${q.price ? q.price.toFixed(2) : '—'}</div>
      </div>
    </div>
    ${recommendation}

    <div class="section-label">Valorisation</div>
    <div class="valuation-grid">
      <div class="valuation-box highlight"><div class="k">Juste valeur (moy.)</div><div class="v">$${v.average ? v.average.toFixed(2) : '—'}</div></div>
      <div class="valuation-box"><div class="k">Marge de sécurité</div><div class="v">${v.margin_of_safety !== null ? (v.margin_of_safety*100).toFixed(0)+'%' : '—'}</div></div>
    </div>

    ${t ? `
      <div class="section-label">Signaux techniques (${CURRENT_HORIZON})</div>
      <div class="signals-list">
        ${t.signals.length ? t.signals.map(s => {
          const cls = s.dir === "bull" ? "bull" : s.dir === "bear" ? "bear" : "";
          const icon = s.dir === "bull" ? "↑" : s.dir === "bear" ? "↓" : "•";
          return `<span class="chip ${cls}">${icon} ${s.name.replaceAll('_', ' ')}</span>`;
        }).join("") : '<div style="color:var(--muted);font-size:13px">Aucun signal</div>'}
      </div>
      <div class="section-label">Graphique</div>
      <div id="chart-container"><canvas id="chart"></canvas></div>
    ` : ''}
  `;
  if (t) renderChart(t);
}

// --- Boot ---
loadAll();
</script>
