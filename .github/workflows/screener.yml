name: Screener Nasdaq 100

on:
  workflow_dispatch:
  schedule:
    - cron: '30 22 * * 1-5'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  screen-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy

      - name: Prepare public folder
        run: |
          mkdir -p public
          cp index.html public/

      - name: Run quality screener
        run: python quality_screener.py --output-dir public

      - name: Run technical screener (all horizons)
        run: python screener.py --horizon all --output-dir public

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

